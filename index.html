<html lang="en">

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>HueType | Build your custom color and font combos</title>
    <script>
      (function () {
        var theme = localStorage.getItem('huetype-theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
        var favicon = document.getElementById('favicon');
        if (favicon) favicon.href = theme === 'dark' ? '/logo_dark.svg' : '/logo_light.svg';

        var path = window.location.pathname;
        if (path === '/privacy' || path === '/privacy/') {
          document.documentElement.classList.add('route-privacy');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
